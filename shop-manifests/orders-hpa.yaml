apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: orders-api
  namespace: shop

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orders-api

  minReplicas: 2
  maxReplicas: 6

  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
