apiVersion: apps/v1
kind: Deployment

metadata:
  name: orders-api
  namespace: shop
  labels:
    app: orders-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: orders-api

  template:

    metadata:
      labels:
        app: orders-api

    spec:

      containers:

      - name: orders-api

        image: mohamedelsayed215/orders-api

        ports:

        - name: http
          containerPort: 3000


        envFrom:

        - configMapRef:
            name: shop-config


        env:

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER


        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD


        - name: PORT
          value: "3000"


        resources:

          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi


        livenessProbe:

          httpGet:

            path: /health
            port: 3000

          initialDelaySeconds: 10
          periodSeconds: 10


        readinessProbe:

          httpGet:

            path: /ready
            port: 3000

          initialDelaySeconds: 5
          periodSeconds: 5
