apiVersion: apps/v1
kind: Deployment

metadata:
  name: products-api
  namespace: shop
  labels:
    app: products-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: products-api

  template:

    metadata:
      labels:
        app: products-api

    spec:

      containers:

      - name: products-api

        image: mohamedelsayed215/products-api

        ports:
        - name: http
          containerPort: 8000


        envFrom:

        - configMapRef:
            name: shop-config


        env:

        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER


        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD


        resources:

          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi


        livenessProbe:

          httpGet:
            path: /health
            port: 8000

          initialDelaySeconds: 10
          periodSeconds: 10


        readinessProbe:

          httpGet:
            path: /ready
            port: 8000

          initialDelaySeconds: 5
          periodSeconds: 5
