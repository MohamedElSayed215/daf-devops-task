name: CI Pipeline

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Select service to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - orders-api
          - products-api

permissions:
  contents: read

jobs:

  orders-api:
    name: Orders API

    if: |
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'orders-api'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: orders-api

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: orders-api/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./orders-api
          file: ./orders-api/Dockerfile
          push: true
          tags: |
            mohamedelsayed215/orders-api:latest
            mohamedelsayed215/orders-api:${{ github.sha }}

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mohamedelsayed215/orders-api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

  products-api:
    name: Products API

    if: |
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'products-api'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: products-api

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./products-api
          file: ./products-api/Dockerfile
          push: true
          tags: |
            mohamedelsayed215/products-api:latest
            mohamedelsayed215/products-api:${{ github.sha }}

      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mohamedelsayed215/products-api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
