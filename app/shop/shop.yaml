apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shop
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/MohamedElSayed215/daf-devops-task.git
    targetRevision: main
    path: shop-manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: shop

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
